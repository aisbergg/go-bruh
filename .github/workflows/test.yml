name: Test

on:
  push:
    tags:
      - v*
    branches:
      - main
      - dev
  pull_request:
permissions:
  contents: read
env:
  MISE_COLOR: false

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: mise run check-generated
      - run: mise run check-format
      - run: mise run check-lint
      - run: mise run check-links
      - run: mise run check-secrets

  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        go-version: [1.23.x, 1.24.x, 1.25.x, 1.26.x]
    name: go-test
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - uses: actions/checkout@v5
      - name: Run the tests
        run: go test -race -v -gcflags '-N -l' ./pkg/...
