version: "2"

run:
  timeout: 5m
  tests: false

output:
  formats:
    text:
      path: stdout

issues:
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
  settings:
    goimports:
      local-prefixes:
        - github.com/aisbergg/go-bruh

    gofumpt:
      extra-rules: true

    golines:
      max-len: 120
      tab-len: 4
      shorten-comments: false
      reformat-tags: true
      chain-split-dots: true

linters:
  default: standard
  enable:
    - bodyclose
    - durationcheck
    - errcheck
    - exhaustive
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - nolintlint

  exclusions:
    paths:
      - "playground/.*"

  settings:
    revive:
      severity: "warning"
      confidence: 0.8
      enable-all-rules: true
      rules:
        - name: add-constant
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: empty-lines
          disabled: true
        - name: blank-imports
          disabled: true
        - name: file-header
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: function-length
          disabled: true
        - name: banned-characters
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: unhandled-error
          disabled: true

        - name: argument-limit
          arguments: [6]
        - name: function-result-limit
          arguments: [3]

    exhaustive:
      check: [switch, map]
      default-signifies-exhaustive: false

    errcheck:
      exclude-functions:
        - (*github.com/aisbergg/go-bruh/pkg/bruh/fmthelper.StringBuilder).WriteString
        - (*github.com/aisbergg/go-bruh/pkg/bruh/fmthelper.StringBuilder).WriteByte
        - (*github.com/aisbergg/go-bruh/pkg/bruh/fmthelper.StringBuilder).WriteStringIndent

    gosec:
      excludes:
        - G104
